<body class="body-bg">

<!-- Nav Bar -->
<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Navbar</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">

        <li class="nav-item">

<!-- Main Body-->
<section id="PartSelector" class="container px-4 py-5">

  <h3 class="mb-4 text-center">Select Parts to Compare</h3>

  <table class="table table-striped text-center align-middle">
    <thead>
      <tr>
        <th>Select</th>
        <th>Component Type</th>
        <th>Model</th>
      </tr>
    </thead>

    <tbody>

      <!-- ROW 1 -->
      <tr>
        <td>
          <input type="checkbox" class="compare-check">
        </td>

        <td>
          <select class="form-select part-type"></select>
        </td>

        <td>
          <select class="form-select part-model"></select>
        </td>
      </tr>

      <!-- ROW 2 -->
      <tr>
        <td>
          <input type="checkbox" class="compare-check">
        </td>

        <td>
          <select class="form-select part-type"></select>
        </td>

        <td>
          <select class="form-select part-model"></select>
        </td>
      </tr>

      <!-- ROW 3 -->
      <tr>
        <td>
          <input type="checkbox" class="compare-check">
        </td>

        <td>
          <select class="form-select part-type"></select>
        </td>

        <td>
          <select class="form-select part-model"></select>
        </td>
      </tr>

    </tbody>
  </table>

</section>

<!-- COMPARISON RESULT -->
<section id="PartComparison" class="container px-4 py-5 text-center">

  <h3 class="mb-4">Comparison Result</h3>

  <div class="row justify-content-center" id="compare-container">
  </div>

</section>
